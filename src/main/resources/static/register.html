<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar conta — Checklist App</title>
    <meta name="description" content="Crie sua conta no Checklist App." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="auth">
      <header class="auth__header">
        <div class="auth__logo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2" />
            <path d="m9 12 2 2 4-4" />
          </svg>
        </div>
        <h1 class="auth__brand">Checklist App</h1>
        <p class="auth__tagline">Organize suas tarefas com facilidade</p>
      </header>

      <section class="auth__card">
        <h2 class="auth__title">Criar nova conta</h2>
        <p class="auth__subtitle">Preencha seus dados para começar</p>

        <form id="register-form" class="form" novalidate>
          <div class="field">
            <label for="name" class="field__label">Nome</label>
            <div class="field__input-wrap">
              <span class="field__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input
                type="text"
                id="name"
                name="name"
                class="field__input"
                placeholder="Seu nome completo"
                maxlength="100"
                autocomplete="name"
                required
              />
            </div>
            <span id="name-error" class="field__error" role="alert"></span>
          </div>

          <div class="field">
            <label for="email" class="field__label">Email</label>
            <div class="field__input-wrap">
              <span class="field__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                class="field__input"
                placeholder="voce@exemplo.com"
                maxlength="255"
                autocomplete="email"
                required
              />
            </div>
            <span id="email-error" class="field__error" role="alert"></span>
          </div>

          <div class="field">
            <label for="password" class="field__label">Senha</label>
            <div class="field__input-wrap">
              <span class="field__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                class="field__input"
                placeholder="Mínimo 6 caracteres"
                maxlength="100"
                autocomplete="new-password"
                required
              />
            </div>
            <span id="password-error" class="field__error" role="alert"></span>
          </div>

          <button type="submit" class="btn btn--primary btn--block">Criar conta</button>
        </form>

        <footer class="auth__footer">
          Já tem uma conta? <a href="login.html">Entrar</a>
        </footer>
      </section>

      <p class="auth__credits">Projeto AEDS-III • Felipe, Lucas e Thayná</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
